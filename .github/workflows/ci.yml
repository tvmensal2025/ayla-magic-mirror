name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Concurrency: cancela build anterior do mesmo branch quando um novo é pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: Vitest (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test

  deno-check:
    name: Deno typecheck (Edge Functions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      # Typecheck dos novos módulos do core (whatsapp-flow-architecture-v3).
      # Os webhooks principais também — falha aqui é regressão de tipo.
      - name: Typecheck core modules
        run: |
          deno check supabase/functions/_shared/channels/ \
                     supabase/functions/_shared/flow-engine/ \
                     supabase/functions/_shared/captation/ \
                     supabase/functions/_shared/conversion/ \
                     supabase/functions/_shared/performance/ \
                     supabase/functions/_shared/customer-flow-state.ts \
                     supabase/functions/_shared/customer-pause-filter.ts \
                     supabase/functions/_shared/logger.ts \
                     supabase/functions/_shared/human-pace.ts \
                     supabase/functions/inbound-media-retry-cron/index.ts
      - name: Typecheck webhooks
        run: |
          deno check supabase/functions/evolution-webhook/index.ts \
                     supabase/functions/whapi-webhook/index.ts

  deno-test:
    name: Deno tests (PBT + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x
      - name: Run Deno tests
        run: |
          deno test --allow-env --no-check \
            supabase/functions/_shared/channels/ \
            supabase/functions/_shared/flow-engine/ \
            supabase/functions/_shared/human-pace_test.ts \
            supabase/functions/_shared/text-hash_test.ts \
            supabase/functions/_shared/grounding_test.ts \
            supabase/functions/_shared/bot/dedupe_test.ts

  spec-format:
    name: Kiro spec format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Validação de formato é feita pelo IDE Kiro. Este step apenas garante
      # que os arquivos canônicos existem nas specs ativas.
      - name: Verify spec files exist
        run: |
          test -f .kiro/specs/whatsapp-flow-architecture-v3/requirements.md
          test -f .kiro/specs/whatsapp-flow-architecture-v3/design.md
          test -f .kiro/specs/whatsapp-flow-architecture-v3/tasks.md
          test -f .kiro/specs/whatsapp-flow-reliability-fix/tasks.md
