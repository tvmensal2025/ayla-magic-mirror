name: Deploy Edge Functions

# Deploy automático de Supabase Edge Functions ao dar push em main.
# Detecta quais funções foram modificadas (por path) e deploya só essas
# pra não estourar tempo do CI. Funções que dependem de _shared/* são
# redeployadas quando _shared muda (porque o bundle inclui _shared).
#
# Triggers:
#   - push em main que toca supabase/functions/**  → deploy automático
#   - workflow_dispatch                            → deploy manual de função específica
#
# Requer secret: SUPABASE_ACCESS_TOKEN no repositório.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:
    inputs:
      function_name:
        description: 'Nome da função a deployar (ou "all" para todas)'
        required: true
        default: 'all'

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: false  # NÃO cancelar deploy em progresso — risco de estado parcial

env:
  SUPABASE_PROJECT_REF: zlzasfhcxcznaprrragl

jobs:
  detect-changes:
    name: Detectar funções modificadas
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.changed.outputs.functions }}
      deploy_all: ${{ steps.changed.outputs.deploy_all }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - id: changed
        name: Compute changed function list
        shell: bash
        run: |
          set -euo pipefail

          # Manual dispatch: usa input.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.function_name }}"
            if [ "$INPUT" = "all" ]; then
              echo "deploy_all=true" >> "$GITHUB_OUTPUT"
              echo "functions=[]" >> "$GITHUB_OUTPUT"
            else
              echo "deploy_all=false" >> "$GITHUB_OUTPUT"
              echo "functions=[\"$INPUT\"]" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          # Push: lista os arquivos que mudaram entre o commit anterior e HEAD.
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE=$(git rev-parse HEAD~1 || echo "")
          fi
          if [ -z "$BEFORE" ]; then
            echo "Sem commit anterior — deployando tudo."
            echo "deploy_all=true" >> "$GITHUB_OUTPUT"
            echo "functions=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" HEAD -- 'supabase/functions/**' 'supabase/config.toml' || true)
          echo "Arquivos alterados:"
          echo "$CHANGED"

          # Se _shared/ mudou OU config.toml mudou OU este workflow mudou, deploy total.
          if echo "$CHANGED" | grep -qE '^supabase/(functions/_shared/|config\.toml)' \
             || echo "$CHANGED" | grep -q '\.github/workflows/deploy-edge-functions\.yml$'; then
            echo "deploy_all=true (_shared/ ou config.toml afetado)"
            echo "deploy_all=true" >> "$GITHUB_OUTPUT"
            echo "functions=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Caso contrário, lista os nomes únicos de função afetados.
          FNS=$(echo "$CHANGED" | grep -oE '^supabase/functions/[^/]+' | sed 's|supabase/functions/||' | sort -u | grep -v '^_shared$' || true)
          if [ -z "$FNS" ]; then
            echo "Nenhuma função afetada — pulando."
            echo "deploy_all=false" >> "$GITHUB_OUTPUT"
            echo "functions=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Converte newline-separated para JSON array
          JSON=$(echo "$FNS" | python3 -c 'import sys,json; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))')
          echo "Funções a deployar: $JSON"
          echo "deploy_all=false" >> "$GITHUB_OUTPUT"
          echo "functions=$JSON" >> "$GITHUB_OUTPUT"

  deploy-all:
    name: Deploy todas as funções
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy_all == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          # `supabase functions deploy` sem nome deploya todas as funções de
          # supabase/functions/* respeitando supabase/config.toml. Isso garante
          # que verify_jwt vem do config (não default true).
          supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"

  deploy-changed:
    name: Deploy ${{ matrix.function }}
    needs: detect-changes
    if: needs.detect-changes.outputs.deploy_all == 'false' && needs.detect-changes.outputs.functions != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        function: ${{ fromJSON(needs.detect-changes.outputs.functions) }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy ${{ matrix.function }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -d "supabase/functions/${{ matrix.function }}" ]; then
            echo "Função ${{ matrix.function }} não existe (foi deletada?). Pulando."
            exit 0
          fi
          supabase functions deploy "${{ matrix.function }}" \
            --project-ref "$SUPABASE_PROJECT_REF"
